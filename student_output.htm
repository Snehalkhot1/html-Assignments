<html>
  <head>
    <META http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Student Application</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
        }

        table {
            border-collapse: collapse;
            width: 70%;
            margin: 30px auto;
            background: white;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }

        th {
            background: #007BFF;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        .pass {
            color: green;
            font-weight: bold;
        }

        .fail {
            color: red;
            font-weight: bold;
        }

        .distinction {
            color: blue;
            font-weight: bold;
        }
    </style>
  </head>
