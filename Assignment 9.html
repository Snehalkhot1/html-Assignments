<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #001122;
            margin: 0;
            padding: 0;
            color: #ffffff;
        }
        
        .container {
            width: 400px;
            margin: 50px auto;
            background: #003366;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
        
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #ffffff;
        }
        
        h3 {
            color: #ffffff;
            margin-top: 20px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #ffffff;
        }
        
        input,
        select,
        textarea {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #555;
            background: #002244;
            color: #ffffff;
            transition: border-color 0.3s;
        }
        
        input:focus,
        select:focus,
        textarea:focus {
            border-color: #007bff;
            outline: none;
        }
        
        input::placeholder,
        textarea::placeholder {
            color: #cccccc;
        }
        
        textarea {
            resize: none;
            height: 80px;
        }
        
        .radio-group,
        .checkbox-group {
            display: flex;
            gap: 10px;
        }
        
        .radio-group label,
        .checkbox-group label {
            color: #ffffff;
            font-weight: normal;
        }
        
        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #0056b3;
        }
        
        #details {
            width: 400px;
            margin: 50px auto;
            background: #003366;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            color: #ffffff;
        }
        
        #details h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        
        #details p {
            margin-bottom: 10px;
        }
        
        #allRegistrations {
            width: 600px;
            margin: 20px auto;
            background: #003366;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            color: #ffffff;
        }
        
        #allRegistrations h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .registration-item {
            background: #002244;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
        }
        
        .registration-item h4 {
            margin-top: 0;
            color: #ffffff;
        }
    </style>

</head>

<body>

    <div class="container">
        <h2>Student Registration Form</h2>

        <form id="registrationForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="fullname" placeholder="Enter your name" required>
            </div>

            <div class="form-group">
                <label>Age</label>
                <input type="number" name="age" placeholder="Enter your age" required>
            </div>

            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" name="dob" required>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" name="phone" placeholder="Enter your phone number" required>
            </div>

            <h3>Address Details</h3>
            <div class="form-group">
                <label>City</label>
                <input type="text" name="city" placeholder="Enter your city" required>
            </div>

            <div class="form-group">
                <label>State</label>
                <input type="text" name="state" placeholder="Enter your state" required>
            </div>

            <div class="form-group">
                <label>Country</label>
                <input type="text" name="country" placeholder="Enter your country" required>
            </div>

            <div class="form-group">
                <label>Pin Code</label>
                <input type="text" name="pincode" placeholder="Enter your pin code" required>
            </div>

            <div class="form-group">
                <label>Aadhar Number</label>
                <input type="text" name="aadhar" placeholder="Enter your Aadhar number" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password" required>
            </div>

            <div class="form-group">
                <label>Gender</label>
                <div class="radio-group">
                    <label><input type="radio" name="gender" value="Male"> Male</label>
                    <label><input type="radio" name="gender" value="Female"> Female</label>
                </div>
            </div>

            <div class="form-group">
                <label>Course</label>
                <select name="course">
                    <option>Select Course</option>
                    <option>B.Tech</option>
                    <option>BCA</option>
                    <option>B.Sc</option>
                </select>
            </div>

            <div class="form-group">
                <label>Hobbies</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="hobby" value="Reading"> Reading</label>
                    <label><input type="checkbox" name="hobby" value="Sports"> Sports</label>
                    <label><input type="checkbox" name="hobby" value="Music"> Music</label>
                </div>
            </div>

            <button type="submit">Register</button>
        </form>
    </div>

    <div id="details" style="display:none;">
        <h2>Registration Details</h2>
        <div id="detailsContent"></div>
    </div>

    <div id="allRegistrations">
        <h2>All Registrations</h2>
        <div id="registrationsList"></div>
    </div>

    <script>
        // Function to load and display all registrations
        function loadRegistrations() {
            const registrations = JSON.parse(localStorage.getItem('studentRegistrations') || '[]');
            const list = document.getElementById('registrationsList');
            list.innerHTML = '';
            registrations.forEach((reg, index) => {
                const item = document.createElement('div');
                item.className = 'registration-item';
                item.innerHTML = `
                    <h4>Registration ${index + 1}: ${reg.fullname}</h4>
                    <p><strong>Email:</strong> ${reg.email}</p>
                    <p><strong>Course:</strong> ${reg.course}</p>
                    <p><strong>Phone:</strong> ${reg.phone}</p>
                `;
                list.appendChild(item);
            });
        }

        // Load registrations on page load
        loadRegistrations();

        document.getElementById('registrationForm').addEventListener('submit', function(event) {
            event.preventDefault();

            // Collect form data
            const formData = new FormData(event.target);
            const hobbies = [];
            event.target.querySelectorAll('input[name="hobby"]:checked').forEach(cb => hobbies.push(cb.value));

            const registrationData = {
                fullname: formData.get('fullname') || 'N/A',
                age: formData.get('age') || 'N/A',
                dob: formData.get('dob') || 'N/A',
                phone: formData.get('phone') || 'N/A',
                city: formData.get('city') || 'N/A',
                state: formData.get('state') || 'N/A',
                country: formData.get('country') || 'N/A',
                pincode: formData.get('pincode') || 'N/A',
                aadhar: formData.get('aadhar') || 'N/A',
                email: formData.get('email') || 'N/A',
                password: formData.get('password') || 'N/A',
                gender: formData.get('gender') || 'N/A',
                course: formData.get('course') !== 'Select Course' ? formData.get('course') : 'N/A',
                hobbies: hobbies.length > 0 ? hobbies.join(', ') : 'None'
            };

            // Save to localStorage
            const registrations = JSON.parse(localStorage.getItem('studentRegistrations') || '[]');
            registrations.push(registrationData);
            localStorage.setItem('studentRegistrations', JSON.stringify(registrations));

            // Update the list
            loadRegistrations();

            // Display details
            let details = '<h3>Personal Information</h3>';
            details += '<p><strong>Full Name:</strong> ' + registrationData.fullname + '</p>';
            details += '<p><strong>Age:</strong> ' + registrationData.age + '</p>';
            details += '<p><strong>Date of Birth:</strong> ' + registrationData.dob + '</p>';
            details += '<p><strong>Phone Number:</strong> ' + registrationData.phone + '</p>';

            details += '<h3>Address Details</h3>';
            details += '<p><strong>City:</strong> ' + registrationData.city + '</p>';
            details += '<p><strong>State:</strong> ' + registrationData.state + '</p>';
            details += '<p><strong>Country:</strong> ' + registrationData.country + '</p>';
            details += '<p><strong>Pin Code:</strong> ' + registrationData.pincode + '</p>';
            details += '<p><strong>Aadhar Number:</strong> ' + registrationData.aadhar + '</p>';

            details += '<h3>Account Information</h3>';
            details += '<p><strong>Email:</strong> ' + registrationData.email + '</p>';
            details += '<p><strong>Password:</strong> ' + registrationData.password + '</p>';
            details += '<p><strong>Gender:</strong> ' + registrationData.gender + '</p>';
            details += '<p><strong>Course:</strong> ' + registrationData.course + '</p>';
            details += '<p><strong>Hobbies:</strong> ' + registrationData.hobbies + '</p>';

            document.getElementById('detailsContent').innerHTML = details;
            document.querySelector('.container').style.display = 'none';
            document.getElementById('details').style.display = 'block';
        });
    </script>

</body>

</html>
