<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Iframe Program</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            color: #333;
            min-height: 100vh;
        }
        
        h1 {
            text-align: center;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        
        p {
            text-align: center;
            color: #fff;
            font-size: 1.2em;
            margin-bottom: 20px;
        }
        /* Navigation */
        
        .nav-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        li {
            margin: 0;
        }
        
        a {
            display: inline-block;
            padding: 12px 24px;
            background: #fff;
            color: #667eea;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        a:hover {
            background: #667eea;
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        /* Main iframe */
        
        .main-iframe-container {
            text-align: center;
            margin-bottom: 40px;
        }
        
        iframe[name="mainFrame"] {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-width: 100%;
            height: 500px;
        }
        
        hr {
            border: none;
            height: 2px;
            background: linear-gradient(90deg, transparent, #fff, transparent);
            margin: 40px 0;
        }
        /* Dashboard */
        
        h2 {
            text-align: center;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
            font-size: 2em;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .dashboard-item {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }
        
        .dashboard-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
        }
        
        .dashboard-item h3 {
            text-align: center;
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        
        .dashboard-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        
        .dashboard-item iframe {
            width: 100%;
            height: 300px;
            border: none;
            border-radius: 10px;
        }
        /* Footer */
        
        .footer {
            text-align: center;
            color: #fff;
            font-style: italic;
            margin-top: 40px;
        }
        /* Responsive */
        
        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }
            ul {
                flex-direction: column;
                align-items: center;
            }
            .dashboard {
                grid-template-columns: 1fr;
            }
            iframe[name="mainFrame"] {
                height: 300px;
            }
        }
    </style>
</head>

<body>
    <h1>My Big Iframe Program</h1>
    <p>Select a site below to view inside the iframe:</p>

    <!-- Navigation links -->
    <div class="nav-container">
        <ul>
            <li><a href="https://www.wikipedia.org" target="mainFrame">Wikipedia</a></li>
            <li><a href="https://www.youtube.com" target="mainFrame">YouTube</a></li>
            <li><a href="https://www.google.com/maps" target="mainFrame">Google Maps</a></li>
            <li><a href="https://www.example.com" target="mainFrame">Example.com</a></li>
        </ul>
    </div>

    <!-- Main iframe -->
    <div class="main-iframe-container">
        <iframe name="mainFrame" src="https://www.wikipedia.org"></iframe>
    </div>

    <hr>

    <!-- Multiple iframes for dashboard-style view -->
    <h2>Dashboard View</h2>
    <div class="dashboard">
        <div class="dashboard-item" onclick="window.open('https://www.wikipedia.org', '_blank')">
            <h3>Wikipedia</h3>
            <iframe src="https://www.wikipedia.org"></iframe>
        </div>
        <div class="dashboard-item" onclick="window.open('https://www.youtube.com', '_blank')">
            <h3>YouTube</h3>
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/09/YouTube_full-color_icon_%282017%29.svg/1024px-YouTube_full-color_icon_%282017%29.svg.png" alt="YouTube">
            <iframe src="https://www.youtube.com"></iframe>
        </div>
        <div class="dashboard-item" onclick="window.open('https://www.google.com/maps', '_blank')">
            <h3>Google Maps</h3>
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Google_Maps_2020_icon.svg/1024px-Google_Maps_2020_icon.svg.png" alt="Google Maps">
            <iframe src="https://www.google.com/maps"></iframe>
        </div>
        <div class="dashboard-item" onclick="window.open('https://www.example.com', '_blank')">
            <h3>Example.com</h3>
            <iframe src="https://www.example.com"></iframe>
        </div>
    </div>

    <hr>

    <p class="footer">End of program. You can expand this by adding more rows and iframes.</p>
</body>

</html>
